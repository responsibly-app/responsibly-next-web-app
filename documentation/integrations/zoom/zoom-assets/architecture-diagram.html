<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Responsibly × Zoom — Architecture Diagram</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #fff;
    color: #1a1a2e;
    padding: 40px;
    font-size: 13px;
  }
  h1 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 4px;
    color: #1a1a2e;
  }
  .subtitle {
    font-size: 12px;
    color: #666;
    margin-bottom: 36px;
  }
  h2 {
    font-size: 14px;
    font-weight: 700;
    margin: 36px 0 16px;
    color: #1a1a2e;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  svg { display: block; overflow: visible; }

  /* ── shared node styles ── */
  .box { rx: 8; ry: 8; }

  /* colours */
  .c-browser  { fill: #e8f4fd; stroke: #4a90d9; stroke-width: 1.5; }
  .c-vercel   { fill: #f0f0f0; stroke: #555; stroke-width: 1.5; stroke-dasharray: 6 3; }
  .c-auth     { fill: #fff3e0; stroke: #f4a636; stroke-width: 1.5; }
  .c-router   { fill: #e8f5e9; stroke: #43a047; stroke-width: 1.5; }
  .c-db       { fill: #fce4ec; stroke: #e53935; stroke-width: 1.5; }
  .c-zoom     { fill: #e3f2fd; stroke: #1565c0; stroke-width: 1.5; }
  .c-webhook  { fill: #ede7f6; stroke: #6a1b9a; stroke-width: 1.5; }

  .lbl { font-size: 11px; font-weight: 600; fill: #1a1a2e; }
  .sub { font-size: 9px; fill: #555; }
  .arrow { stroke: #555; stroke-width: 1.4; fill: none; marker-end: url(#arr); }
  .arrow-blue { stroke: #1565c0; stroke-width: 1.4; fill: none; marker-end: url(#arr-blue); stroke-dasharray: 5 3; }
  .arrow-red  { stroke: #c62828; stroke-width: 1.4; fill: none; marker-end: url(#arr-red); }
  .edge-label { font-size: 9px; fill: #444; }

  .flow-step {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 10px;
  }
  .step-num {
    background: #1a1a2e;
    color: #fff;
    border-radius: 50%;
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .step-text { font-size: 12px; line-height: 1.6; color: #333; padding-top: 2px; }
  .step-text strong { color: #1a1a2e; }

  @media print {
    body { padding: 20px; }
    h2 { page-break-before: auto; }
  }
</style>
</head>
<body>

<h1>Responsibly × Zoom — Architecture &amp; Flow Diagrams</h1>
<p class="subtitle">All services that interact with Zoom, including OAuth, webhooks, and data flows</p>

<!-- ═══════════════════════════════════════════════════════════
     DIAGRAM 1 — SYSTEM ARCHITECTURE
     ═══════════════════════════════════════════════════════════ -->
<h2>1 · System Architecture Overview</h2>

<svg width="820" height="480" viewBox="0 0 820 480">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1565c0"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c62828"/>
    </marker>
  </defs>

  <!-- ── User Browser ── -->
  <rect x="275" y="10" width="270" height="72" rx="8" class="c-browser box"/>
  <text x="410" y="36" class="lbl" text-anchor="middle">User Browser</text>
  <text x="410" y="52" class="sub" text-anchor="middle">Next.js 16 App Router (React 19)</text>
  <text x="410" y="66" class="sub" text-anchor="middle">TanStack Query v5 · Tailwind CSS v4</text>

  <!-- arrow down: Browser → Vercel -->
  <line x1="410" y1="82" x2="410" y2="112" class="arrow"/>
  <text x="418" y="101" class="edge-label">HTTPS / TLS 1.2+</text>

  <!-- ── Vercel boundary ── -->
  <rect x="50" y="116" width="720" height="220" rx="10" class="c-vercel box"/>
  <text x="70" y="136" style="font-size:10px;fill:#555;font-weight:600;">VERCEL SERVERLESS FUNCTIONS (Next.js API Routes via oRPC)</text>

  <!-- Better Auth box -->
  <rect x="80" y="148" width="220" height="88" rx="7" class="c-auth box"/>
  <text x="190" y="170" class="lbl" text-anchor="middle">Better Auth v1.5</text>
  <text x="190" y="186" class="sub" text-anchor="middle">OAuth 2.0 Authorization Code</text>
  <text x="190" y="200" class="sub" text-anchor="middle">HTTP-only Cookie Sessions</text>
  <text x="190" y="214" class="sub" text-anchor="middle">AES-256 Token Encryption</text>

  <!-- Zoom Router box -->
  <rect x="340" y="148" width="390" height="88" rx="7" class="c-router box"/>
  <text x="535" y="170" class="lbl" text-anchor="middle">Zoom Router</text>
  <text x="535" y="186" class="sub" text-anchor="middle">/zoom/status  · /zoom/profile</text>
  <text x="535" y="200" class="sub" text-anchor="middle">/zoom/meetings (list · get · create · update · delete)</text>
  <text x="535" y="214" class="sub" text-anchor="middle">/zoom/webhook (endpoint.url_validation · participant events · meeting.ended)</text>

  <!-- horizontal connector inside Vercel -->
  <line x1="300" y1="192" x2="340" y2="192" class="arrow"/>
  <text x="312" y="188" class="edge-label">session ctx</text>

  <!-- ── PostgreSQL (Supabase) ── -->
  <rect x="80" y="370" width="220" height="88" rx="8" class="c-db box"/>
  <text x="190" y="393" class="lbl" text-anchor="middle">PostgreSQL (Supabase)</text>
  <text x="190" y="409" class="sub" text-anchor="middle">User sessions · Encrypted OAuth tokens</text>
  <text x="190" y="423" class="sub" text-anchor="middle">Zoom meeting IDs</text>
  <text x="190" y="437" class="sub" text-anchor="middle">Participant sessions · Attendance records</text>

  <!-- Better Auth → DB -->
  <line x1="190" y1="236" x2="190" y2="370" class="arrow"/>
  <text x="197" y="308" class="edge-label">AES-256</text>
  <text x="197" y="320" class="edge-label">encrypted</text>
  <text x="197" y="332" class="edge-label">tokens</text>

  <!-- Zoom Router → DB -->
  <line x1="400" y1="236" x2="270" y2="384" class="arrow-red"/>
  <text x="310" y="310" class="edge-label" style="fill:#c62828;">attendance /</text>
  <text x="310" y="322" class="edge-label" style="fill:#c62828;">meeting IDs</text>

  <!-- ── Zoom REST API ── -->
  <rect x="560" y="370" width="230" height="60" rx="8" class="c-zoom box"/>
  <text x="675" y="396" class="lbl" text-anchor="middle">Zoom REST API v2</text>
  <text x="675" y="412" class="sub" text-anchor="middle">api.zoom.us · Bearer access token</text>

  <!-- Zoom Router → Zoom API -->
  <line x1="620" y1="236" x2="675" y2="370" class="arrow"/>
  <text x="655" y="310" class="edge-label">Bearer</text>
  <text x="655" y="322" class="edge-label">token</text>

  <!-- ── Zoom Webhook Events ── -->
  <rect x="560" y="455" width="230" height="20" rx="5" class="c-webhook box"/>
  <text x="675" y="469" class="sub" text-anchor="middle" style="fill:#4a148c;font-weight:600;">Zoom Webhook Events (HMAC-SHA256)</text>

  <!-- Zoom Webhook → Router -->
  <path d="M 675 455 L 675 440 L 620 440 L 620 236" class="arrow-blue"/>
  <text x="628" y="390" class="edge-label" style="fill:#1565c0;">HMAC-SHA256</text>
  <text x="628" y="402" class="edge-label" style="fill:#1565c0;">verified</text>

  <!-- Browser → Better Auth (login) -->
  <line x1="330" y1="150" x2="300" y2="150" class="arrow"/>
  <text x="302" y="146" class="edge-label">login /</text>
  <text x="302" y="157" class="edge-label">callback</text>

</svg>


<!-- ═══════════════════════════════════════════════════════════
     DIAGRAM 2 — OAUTH FLOW
     ═══════════════════════════════════════════════════════════ -->
<h2>2 · OAuth 2.0 Authorization Code Flow</h2>

<svg width="820" height="300" viewBox="0 0 820 300">
  <defs>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Swimlane headers -->
  <rect x="0"   y="0" width="164" height="36" rx="6" fill="#e8f4fd" stroke="#4a90d9" stroke-width="1.2"/>
  <rect x="168" y="0" width="164" height="36" rx="6" fill="#fff3e0" stroke="#f4a636" stroke-width="1.2"/>
  <rect x="336" y="0" width="164" height="36" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.2"/>
  <rect x="504" y="0" width="164" height="36" rx="6" fill="#fce4ec" stroke="#e53935" stroke-width="1.2"/>
  <rect x="672" y="0" width="140" height="36" rx="6" fill="#e8f5e9" stroke="#43a047" stroke-width="1.2"/>

  <text x="82"  y="23" class="lbl" text-anchor="middle">User Browser</text>
  <text x="250" y="23" class="lbl" text-anchor="middle">Better Auth (Vercel)</text>
  <text x="418" y="23" class="lbl" text-anchor="middle">Zoom OAuth</text>
  <text x="586" y="23" class="lbl" text-anchor="middle">PostgreSQL</text>
  <text x="742" y="23" class="lbl" text-anchor="middle">Responsibly App</text>

  <!-- Lifelines -->
  <line x1="82"  y1="36" x2="82"  y2="290" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="250" y1="36" x2="250" y2="290" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="418" y1="36" x2="418" y2="290" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="586" y1="36" x2="586" y2="290" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="742" y1="36" x2="742" y2="290" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Step arrows (left to right or right to left) -->
  <!-- 1: User clicks Connect Zoom -->
  <line x1="82" y1="70" x2="246" y2="70" stroke="#555" stroke-width="1.3" marker-end="url(#arr2)"/>
  <text x="164" y="65" class="edge-label" text-anchor="middle">① Click "Connect Zoom"</text>

  <!-- 2: Better Auth → Zoom OAuth redirect -->
  <line x1="250" y1="95" x2="414" y2="95" stroke="#555" stroke-width="1.3" marker-end="url(#arr2)"/>
  <text x="332" y="90" class="edge-label" text-anchor="middle">② Redirect to Zoom consent screen</text>

  <!-- 3: User grants permission at Zoom -->
  <line x1="418" y1="120" x2="86" y2="120" stroke="#555" stroke-width="1.3" marker-end="url(#arr2)"/>
  <text x="250" y="115" class="edge-label" text-anchor="middle">③ User grants permission</text>

  <!-- 4: Browser returns auth code to Better Auth callback -->
  <line x1="82" y1="145" x2="246" y2="145" stroke="#555" stroke-width="1.3" marker-end="url(#arr2)"/>
  <text x="164" y="140" class="edge-label" text-anchor="middle">④ Redirect with authorization code</text>

  <!-- 5: Better Auth exchanges code at Zoom -->
  <line x1="250" y1="170" x2="414" y2="170" stroke="#555" stroke-width="1.3" marker-end="url(#arr2)"/>
  <text x="332" y="165" class="edge-label" text-anchor="middle">⑤ Exchange code → access + refresh tokens</text>

  <!-- 6: Zoom returns tokens -->
  <line x1="418" y1="195" x2="254" y2="195" stroke="#555" stroke-width="1.3" marker-end="url(#arr2)"/>
  <text x="332" y="190" class="edge-label" text-anchor="middle">⑥ Return tokens</text>

  <!-- 7: Better Auth stores AES-256 encrypted -->
  <line x1="250" y1="220" x2="582" y2="220" stroke="#c62828" stroke-width="1.3" marker-end="url(#arr2)"/>
  <text x="416" y="215" class="edge-label" text-anchor="middle" style="fill:#c62828;">⑦ Store AES-256 encrypted tokens (encryptOAuthTokens: true)</text>

  <!-- 8: Subsequent API calls use decrypted token -->
  <line x1="742" y1="255" x2="254" y2="255" stroke="#1565c0" stroke-width="1.3" stroke-dasharray="5 3" marker-end="url(#arr2)"/>
  <text x="496" y="250" class="edge-label" text-anchor="middle" style="fill:#1565c0;">⑧ Subsequent API calls — Better Auth decrypts token, calls Zoom REST API</text>
</svg>


<!-- ═══════════════════════════════════════════════════════════
     DIAGRAM 3 — WEBHOOK ATTENDANCE FLOW
     ═══════════════════════════════════════════════════════════ -->
<h2>3 · Webhook Attendance Flow</h2>

<svg width="820" height="290" viewBox="0 0 820 290">
  <defs>
    <marker id="arr3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Swimlane headers -->
  <rect x="0"   y="0" width="200" height="36" rx="6" fill="#ede7f6" stroke="#6a1b9a" stroke-width="1.2"/>
  <rect x="204" y="0" width="260" height="36" rx="6" fill="#e8f5e9" stroke="#43a047" stroke-width="1.2"/>
  <rect x="468" y="0" width="344" height="36" rx="6" fill="#fce4ec" stroke="#e53935" stroke-width="1.2"/>

  <text x="100" y="23" class="lbl" text-anchor="middle">Zoom (Event Source)</text>
  <text x="334" y="23" class="lbl" text-anchor="middle">Zoom Webhook Handler (Vercel)</text>
  <text x="640" y="23" class="lbl" text-anchor="middle">PostgreSQL (Supabase)</text>

  <!-- Lifelines -->
  <line x1="100" y1="36" x2="100" y2="280" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="334" y1="36" x2="334" y2="280" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="640" y1="36" x2="640" y2="280" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- 1 -->
  <line x1="100" y1="66" x2="330" y2="66" stroke="#555" stroke-width="1.3" marker-end="url(#arr3)"/>
  <text x="215" y="61" class="edge-label" text-anchor="middle">① meeting.participant_joined event (POST /zoom/webhook)</text>

  <!-- 2 -->
  <rect x="220" y="74" width="228" height="20" rx="4" fill="#c8e6c9" stroke="#43a047" stroke-width="1"/>
  <text x="334" y="88" class="sub" text-anchor="middle" style="fill:#1b5e20;">② Verify HMAC-SHA256 (x-zm-signature · timingSafeEqual)</text>

  <!-- 3 -->
  <line x1="334" y1="104" x2="636" y2="104" stroke="#c62828" stroke-width="1.3" marker-end="url(#arr3)"/>
  <text x="485" y="99" class="edge-label" text-anchor="middle" style="fill:#c62828;">③ Open participant session record</text>

  <!-- 4 -->
  <line x1="100" y1="134" x2="330" y2="134" stroke="#555" stroke-width="1.3" marker-end="url(#arr3)"/>
  <text x="215" y="129" class="edge-label" text-anchor="middle">④ meeting.participant_left OR meeting.ended event</text>

  <!-- 5 -->
  <rect x="220" y="142" width="228" height="20" rx="4" fill="#c8e6c9" stroke="#43a047" stroke-width="1"/>
  <text x="334" y="156" class="sub" text-anchor="middle" style="fill:#1b5e20;">⑤ Verify HMAC-SHA256 signature again</text>

  <!-- 6 -->
  <line x1="334" y1="172" x2="636" y2="172" stroke="#c62828" stroke-width="1.3" marker-end="url(#arr3)"/>
  <text x="485" y="167" class="edge-label" text-anchor="middle" style="fill:#c62828;">⑥ Close session record · calculate duration</text>

  <!-- 7 -->
  <rect x="468" y="180" width="344" height="20" rx="4" fill="#ffcdd2" stroke="#e53935" stroke-width="1"/>
  <text x="640" y="194" class="sub" text-anchor="middle" style="fill:#b71c1c;">⑦ Auto-attendance eval: duration ≥ threshold? → mark PRESENT in attendance table</text>

  <!-- 8: url_validation flow -->
  <line x1="100" y1="224" x2="330" y2="224" stroke="#6a1b9a" stroke-width="1.3" stroke-dasharray="5 3" marker-end="url(#arr3)"/>
  <text x="215" y="219" class="edge-label" text-anchor="middle" style="fill:#6a1b9a;">⑧ endpoint.url_validation (challenge-response at registration)</text>
  <line x1="334" y1="244" x2="104" y2="244" stroke="#6a1b9a" stroke-width="1.3" stroke-dasharray="5 3" marker-end="url(#arr3)"/>
  <text x="215" y="239" class="edge-label" text-anchor="middle" style="fill:#6a1b9a;">⑨ Return HMAC-SHA256 hash of plainToken → endpoint validated</text>
</svg>


<!-- ═══════════════════════════════════════════════════════════
     LEGEND
     ═══════════════════════════════════════════════════════════ -->
<h2>Legend</h2>
<svg width="820" height="60" viewBox="0 0 820 60">
  <!-- solid arrow = sync HTTP -->
  <line x1="10" y1="22" x2="50" y2="22" stroke="#555" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="58" y="26" class="sub">Synchronous HTTPS call</text>
  <!-- dashed blue = token usage -->
  <line x1="190" y1="22" x2="230" y2="22" stroke="#1565c0" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#arr-blue)"/>
  <text x="238" y="26" class="sub">Bearer-token-authenticated call</text>
  <!-- solid red = DB write -->
  <line x1="420" y1="22" x2="460" y2="22" stroke="#c62828" stroke-width="1.4" marker-end="url(#arr-red)"/>
  <text x="468" y="26" class="sub">Encrypted database write</text>
  <!-- dashed purple = webhook -->
  <line x1="620" y1="22" x2="660" y2="22" stroke="#6a1b9a" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#arr-blue)"/>
  <text x="668" y="26" class="sub" style="fill:#6a1b9a;">Webhook / challenge-response</text>
  <!-- colour swatches row 2 -->
  <rect x="10"  y="40" width="14" height="14" rx="3" fill="#fff3e0" stroke="#f4a636" stroke-width="1.2"/>
  <text x="30"  y="51" class="sub">Better Auth</text>
  <rect x="120" y="40" width="14" height="14" rx="3" fill="#e8f5e9" stroke="#43a047" stroke-width="1.2"/>
  <text x="140" y="51" class="sub">Zoom Router / Webhook Handler</text>
  <rect x="320" y="40" width="14" height="14" rx="3" fill="#fce4ec" stroke="#e53935" stroke-width="1.2"/>
  <text x="340" y="51" class="sub">PostgreSQL (Supabase)</text>
  <rect x="490" y="40" width="14" height="14" rx="3" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.2"/>
  <text x="510" y="51" class="sub">Zoom REST API v2 / OAuth</text>
  <rect x="660" y="40" width="14" height="14" rx="3" fill="#ede7f6" stroke="#6a1b9a" stroke-width="1.2"/>
  <text x="680" y="51" class="sub">Zoom Webhook Events</text>
</svg>

</body>
</html>
